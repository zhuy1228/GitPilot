# This file contains the configuration for this project.
# When you update `info` or `fileAssociations`, run `wails3 task common:update:build-assets` to update the assets.
version: '3'

info:
  companyName: "GitPilot"
  productName: "GitPilot"
  productIdentifier: "com.gitpilot.app"
  description: "Git Repository Management Tool"
  copyright: "(c) 2025, GitPilot"
  comments: "GitPilot - Git Repository Manager"
  version: "0.4.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 300
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: powershell.exe -ExecutionPolicy Bypass -File ./build/wait.ps1 -Seconds 30
      type: blocking
    - cmd: wails3 task build
      type: blocking
    - cmd: wails3 task run
      type: primary

fileAssociations:

other:
