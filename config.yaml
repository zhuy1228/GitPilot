platforms:
  github:
    users:
      - username: "zz_main"
        token: ""          # 可选：未来扩展 API 功能
        projects:
          - name: "projectA"
            path: "F:/Projects/github/projectA"
          - name: "projectB"
            path: "F:/Projects/github/projectB"

      - username: "zz_work"
        token: ""
        projects:
          - name: "work-tool"
            path: "F:/Projects/github/work-tool"

  gitee:
